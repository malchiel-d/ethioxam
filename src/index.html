<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUEE simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
       <div class="quiz-wrapper">
        
        <div class="timer-container">
            <div class="timer-box">
                Time left 00:00:00
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionDiv">
              Question goes here
            </div>

            <form id="quizForm">
                <div class="options-list">
                    <label class="option-item">
                        <input type="radio" name="answer" value="a">
                        <span class="option-label">a.answer a goes here</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="b">
                        <span class="option-label">b.answer b goes here</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="c" >
                        <span class="option-label">c.answer c goes here</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="d">
                        <span class="option-label">d. answer d goes here</span>
                    </label>
                </div>
            </form>

            <a href="#" class="clear-choice" id="clearBtn">Clear my choice</a>
        </div>

        <div class="nav-footer">
            <button class="btn btn-prev" id="previousBtn">Previous page</button>
            <button class="btn btn-next" id="nextBtn">Next page</button>
        </div>

    </div>
   <!-- <script src="questions.js"></script>
    <script src="script.js"></script>  --> 
    <script>
    //questions
    const quizData = [
      {
        id: 1,
        question: "What is the capital of France?",
        choices: { A: "Paris", B: "London", C: "Berlin", D: "Madrid" },
        correct: "A"
      },
      {
        id: 2,
        question: "Which planet is known as the Red Planet?",
        choices: { A: "Earth", B: "Mars", C: "Jupiter", D: "Venus" },
        correct: "B"
      },
      {
        id: 3,
        question: "What is 5 + 7?",
        choices: { A: "10", B: "11", C: "12", D: "13" },
        correct: "C"
      }
    ]
    let currentQuestionIndex = 0;
    let currentQuestion = quizData[currentQuestionIndex];
    //clear-button
   document.querySelector('#clearBtn').onclick = e => {
    e.preventDefault();
    document.querySelectorAll('#quizForm input').forEach(i => i.checked = false);
   };
    
    //next and prev btn    
    let nextBtn = document.querySelector('#nextBtn').addEventListener("click",next);
    let previousBtn = document.querySelector('#previousBtn').addEventListener("click",previous);   
    
    function next(){
        currentQuestionIndex++ ;
        console.log(currentQuestionIndex);
    }
    
     function previous(){    
        currentQuestionIndex-- ;
        console.log(currentQuestionIndex)
        
    }
    next()
    previous()
    //adding quiz data to screen
    let questionHtml = document.querySelector('.quiz-wrapper #questionDiv');
    let choiceHtml = document.querySelectorAll('.option-label');    
    
          //add question
    questionHtml.textContent = currentQuestion.question;
          //add the choioces
    Object.values(currentQuestion.choices).forEach((choice, index) => {
    choiceHtml[index].textContent = String.fromCharCode(97 + index) + ". " + choice;
});
    
    </script>
</body>
</html>
