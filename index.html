<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
       <div class="quiz-wrapper">
        
        <div class="timer-container">
            <div class="timer-box">
                Time left 00:00:00
            </div>
        </div>

        <div class="question-card">
            <div class="question-text">
               What is 1 + 1
            </div>

            <form id="quizForm">
                <div class="options-list">
                    <label class="option-item">
                        <input type="radio" name="answer" value="a">
                        <span class="option-label">a. 3</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="b">
                        <span class="option-label">b. 5</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="c" >
                        <span class="option-label">c. 2</span>
                    </label>

                    <label class="option-item">
                        <input type="radio" name="answer" value="d">
                        <span class="option-label">d. 11</span>
                    </label>
                </div>
            </form>

            <a href="#" class="clear-choice">Clear my choice</a>
        </div>

        <div class="nav-footer">
            <button class="btn btn-prev">Previous page</button>
            <button class="btn btn-next">Next page</button>
        </div>

    </div>
    <script src="questions.js"></script>
    <script src="script.js"></script>  
</body>
</html>
