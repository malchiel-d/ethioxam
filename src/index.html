<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EUEE simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="btn-start" id="start-btn">Start</button>
  
  <div class="quiz-wrapper" id="quiz-wrapper">
      <!--timer-->
    <div class="timer-container">
      <div class="timer-box">Time left 00:00:00</div>
    </div>
      
    <div class="question-card">
      <div class="question-text" id="questionDiv">Question goes here</div>
        <!--choices-->
        <form id="quizForm">
          <div class="options-list">
            <label class="option-item">
              <input type="radio" name="answer" value="a">
              <span class="option-label">a.answer a goes here</span>
            </label>
            <label class="option-item">
              <input type="radio" name="answer" value="b">
              <span class="option-label">b.answer b goes here</span>
            </label>
            <label class="option-item">
              <input type="radio" name="answer" value="c" >
              <span class="option-label">c.answer c goes here</span>
            </label>
            <label class="option-item">
              <input type="radio" name="answer" value="d">
              <span class="option-label">d. answer d goes here</span>
            </label>
          </div>
        </form>
        
        <a href="#" class="clear-choice" id="clearBtn">Clear my choice</a>
      </div>
      
    <div class="nav-footer">
      <button class="btn btn-prev" id="previousBtn">Previous page</button>
      <button class="btn btn-next" id="nextBtn">Next page</button>
    </div>
      
  </div>
    
   
    <script src="script.js"></script>
</body>
</html>
