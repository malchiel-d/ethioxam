<head>
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .quiz-wrapper {
      display: none;
      text-align: center;
    }

    .option-list {
      margin: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
  </style>
</head>

<body>

  <div class="start-screen">
    <button onclick="beginQuiz()">Start Quiz</button>
  </div>

  <div class="quiz-wrapper">
    <h2 id="question-text">Question text goes here</h2>

    <div class="option-list">
      <label><input type="radio" name="answer" onclick="pickAnswer('A')"> <span id="optionA"></span></label>
      <label><input type="radio" name="answer" onclick="pickAnswer('B')"> <span id="optionB"></span></label>
      <label><input type="radio" name="answer" onclick="pickAnswer('C')"> <span id="optionC"></span></label>
      <label><input type="radio" name="answer" onclick="pickAnswer('D')"> <span id="optionD"></span></label>
    </div>

    <div>
      <button onclick="previousQuestion()">prev</button>
      <button onclick="nextQuestion()">next</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        id: 1,
        question: "What is the capital of France?",
        choices: { A: "Paris", B: "London", C: "Berlin", D: "Madrid" },
        correct: "A"
      },
      {
        id: 2,
        question: "Which planet is known as the Red Planet?",
        choices: { A: "Earth", B: "Mars", C: "Jupiter", D: "Venus" },
        correct: "B"
      },
      {
        id: 3,
        question: "What is 5 + 7?",
        choices: { A: "10", B: "11", C: "12", D: "13" },
        correct: "C"
      }
    ]

    let totalScore = 0
    let questionIndex = 0
    let chosenAnswer = null

    const quizContainer = document.querySelector(".quiz-wrapper")
    const startScreen = document.querySelector(".start-screen")

    function beginQuiz() {
      startScreen.style.display = "none"
      quizContainer.style.display = "block"
      renderQuestion()
    }

    function renderQuestion() {
      const current = quizData[questionIndex]

      document.getElementById("question-text").innerText = current.question

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.checked = false
      })

      for (let key in current.choices) {
        document.getElementById("option" + key).innerText = current.choices[key]
      }
    }

    function pickAnswer(option) {
      chosenAnswer = option
    }

    function nextQuestion() {
      if (chosenAnswer === quizData[questionIndex].correct) {
        totalScore++
      }

      chosenAnswer = null

      if (questionIndex < quizData.length - 1) {
        questionIndex++
        renderQuestion()
      } else {
        finishQuiz()
      }
    }

    function previousQuestion() {
      if (questionIndex > 0) {
        questionIndex--
        renderQuestion()
      }
    }

    function finishQuiz() {
      quizContainer.innerHTML =
        `<h2>Quiz Finished!</h2>
         <p>Your Score: ${totalScore} / ${quizData.length}</p>`
    }
  </script>

</body>
